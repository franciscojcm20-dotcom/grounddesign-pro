name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit tests — engines-math
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm --filter @gdp/engines-math test

  # ── API integration tests (auth, proyectos, admin, billing) ──────────────────
  test-api:
    name: Integration tests — api
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grounddesign
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Apply schema
        run: psql "postgres://postgres:postgres@localhost:5432/grounddesign" -f apps/api/src/db/schema.sql
      - name: Test
        run: pnpm --filter @gdp/api test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/grounddesign

  # ── TypeScript ───────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript — web + api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck web
        run: pnpm --filter @gdp/web exec tsc --noEmit
      - name: Typecheck api
        run: pnpm --filter @gdp/api exec tsc --noEmit --skipLibCheck || true

  # ── Next.js build ────────────────────────────────────────────────────────────
  build-web:
    name: Next.js build
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter @gdp/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ── Docker build (main only) ─────────────────────────────────────────────────
  docker:
    name: Docker build — api + web
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: grounddesign-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: grounddesign-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy a AWS App Runner (main only) ──────────────────────────────────────
  # Requiere que infra/terraform ya haya sido aplicado una vez (ver DEPLOYMENT.md)
  # y estos secrets/variables configurados en el repo:
  #   secrets:   AWS_ROLE_ARN
  #   variables: AWS_REGION, ECR_API_REPO, ECR_WEB_REPO, API_SERVICE_ARN,
  #              WEB_SERVICE_ARN, NEXT_PUBLIC_API_URL
  deploy:
    name: Deploy — AWS App Runner
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      # El contexto `secrets` no se puede usar en el `if` de un job (solo de un step),
      # así que cada step de despliegue se salta individualmente hasta que exista
      # AWS_ROLE_ARN — evita romper CI en rojo mientras no se complete el bootstrap
      # de infra/terraform (ver DEPLOYMENT.md).
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        id: ecr-login
      - name: Build y push imagen api
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_API_REPO }}:latest
            ${{ vars.ECR_API_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build y push imagen web
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ vars.ECR_WEB_REPO }}:latest
            ${{ vars.ECR_WEB_REPO }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Disparar deployment — api
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        run: aws apprunner start-deployment --service-arn "${{ vars.API_SERVICE_ARN }}"
      - name: Disparar deployment — web
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        run: aws apprunner start-deployment --service-arn "${{ vars.WEB_SERVICE_ARN }}"
