services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grounddesing
      POSTGRES_USER: gdp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gdpdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdp -d grounddesing"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgres://gdp:${DB_PASSWORD:-gdpdev}@db:5432/grounddesing
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"

volumes:
  pgdata:
